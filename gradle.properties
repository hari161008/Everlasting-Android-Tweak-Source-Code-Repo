org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
android.suppressUnsupportedCompileSdk=36
kotlin.code.style=official
android.nonTransitiveRClass=false
android.nonFinalResIds=false
android.injected.testOnly=false

# LockscreenWidgets MigrationManager database version
databaseVersion=9

kotlin.jvm.target.validation.mode=IGNORE
# ROOT CAUSE FIX: AGP 8.10.1 ships with an R8 version that understands
# Kotlin 2.1–2.2 metadata. Third-party deps (Bugsnag, coil, atomicfu, etc.)
# are compiled with Kotlin 2.1–2.2 so AGP 8.9.x R8 couldn't parse their
# @Metadata annotations. Upgrading AGP eliminates the vast majority of warnings.
#
# This property suppresses any residual warnings from very old .aar files
# that bundle even newer Kotlin metadata than AGP 8.10 R8 understands.
android.r8.failOnMissingKotlinMetadata=false
